<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#080d18"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="ScholarWatch"/>
<meta name="description" content="Live academic paper spotlight — Daily, Weekly, Monthly trending research"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icons/icon-192.png"/>
<link rel="icon" href="icons/icon-192.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Mono:wght@300;400;500&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet"/>
<title>ScholarWatch ✦</title>
<style>
/* ── Reset & Base ─────────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:        #080d18;
  --bg2:       #0d1525;
  --bg3:       #111e35;
  --card:      #131f38;
  --card2:     #1a2a47;
  --border:    #1e3055;
  --fg:        #dde8f5;
  --fg-dim:    #5a7399;
  --fg-mid:    #8aaace;
  --accent:    #38bdf8;
  --gold:      #fbbf24;
  --green:     #34d399;
  --red:       #f87171;

  --health:    #f43f5e;
  --economy:   #f59e0b;
  --exercise:  #10b981;
  --education: #3b82f6;
  --battery:   #a855f7;
  --others:    #06b6d4;

  --font-display: 'Playfair Display', Georgia, serif;
  --font-mono:    'DM Mono', 'Courier New', monospace;
  --font-body:    'Lora', Georgia, serif;

  --safe-top:    env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --radius:      14px;
  --radius-sm:   8px;
}

html{height:100%;background:var(--bg)}
body{
  min-height:100%;
  background:var(--bg);
  color:var(--fg);
  font-family:var(--font-body);
  font-size:15px;
  line-height:1.6;
  overscroll-behavior:none;
}

/* ── Noise texture overlay ───────────────────────────────────────────── */
body::before{
  content:'';
  position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events:none;z-index:0;opacity:0.6;
}

/* ── Layout shells ───────────────────────────────────────────────────── */
#app{
  display:flex;flex-direction:column;
  min-height:100dvh;
  padding-top:var(--safe-top);
  position:relative;z-index:1;
}

/* ── Header ──────────────────────────────────────────────────────────── */
header{
  padding:18px 20px 14px;
  background:linear-gradient(180deg,var(--bg) 0%,transparent 100%);
  position:sticky;top:0;z-index:100;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
}
.header-top{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:4px;
}
.logo{
  display:flex;align-items:center;gap:10px;
}
.logo-star{
  font-size:24px;animation:pulse 3s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.logo-text{
  font-family:var(--font-display);
  font-size:22px;font-weight:900;
  background:linear-gradient(135deg,var(--fg) 30%,var(--accent));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.logo-sub{
  font-family:var(--font-mono);font-size:10px;
  color:var(--fg-dim);letter-spacing:0.12em;text-transform:uppercase;
  display:block;margin-top:-2px;
}
.header-right{
  display:flex;align-items:center;gap:10px;
}
#refresh-btn{
  background:var(--card2);border:1px solid var(--border);
  color:var(--accent);font-size:18px;
  width:38px;height:38px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all 0.2s;
}
#refresh-btn:active{transform:scale(0.9);background:var(--accent);color:var(--bg)}
#refresh-btn.spinning{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#clock{
  font-family:var(--font-mono);font-size:10px;
  color:var(--fg-dim);text-align:right;
}

/* ── Period tabs ─────────────────────────────────────────────────────── */
.period-tabs{
  display:flex;gap:6px;
  padding:0 20px 14px;
  overflow-x:auto;scrollbar-width:none;
}
.period-tabs::-webkit-scrollbar{display:none}
.period-tab{
  flex:1;min-width:80px;
  padding:9px 4px;
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius-sm);
  font-family:var(--font-mono);font-size:12px;
  color:var(--fg-dim);text-align:center;cursor:pointer;
  transition:all 0.2s;white-space:nowrap;
}
.period-tab.active{
  background:var(--accent);border-color:var(--accent);
  color:var(--bg);font-weight:500;
}
.period-tab:active{opacity:0.7}

/* ── Category chips ──────────────────────────────────────────────────── */
.cat-scroll{
  display:flex;gap:8px;
  padding:0 20px 16px;
  overflow-x:auto;scrollbar-width:none;
}
.cat-scroll::-webkit-scrollbar{display:none}
.cat-chip{
  display:flex;align-items:center;gap:6px;
  padding:7px 14px;
  background:var(--card);border:1px solid var(--border);
  border-radius:40px;white-space:nowrap;
  font-family:var(--font-mono);font-size:12px;
  color:var(--fg-dim);cursor:pointer;
  transition:all 0.2s;flex-shrink:0;
}
.cat-chip.active{color:#fff;border-color:transparent}
.cat-chip:active{opacity:0.7;transform:scale(0.96)}
.cat-chip[data-cat="Health"].active{background:var(--health)}
.cat-chip[data-cat="Economy"].active{background:var(--economy)}
.cat-chip[data-cat="Exercise"].active{background:var(--exercise)}
.cat-chip[data-cat="Education"].active{background:var(--education)}
.cat-chip[data-cat="Battery"].active{background:var(--battery)}
.cat-chip[data-cat="Others"].active{background:var(--others)}

/* ── Stats bar ───────────────────────────────────────────────────────── */
.stats-bar{
  display:flex;gap:0;
  margin:0 20px 16px;
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius-sm);
  overflow:hidden;
}
.stat-item{
  flex:1;padding:8px 4px;text-align:center;
  border-right:1px solid var(--border);
}
.stat-item:last-child{border-right:none}
.stat-icon{font-size:14px;display:block}
.stat-num{
  font-family:var(--font-mono);font-size:13px;font-weight:500;
  color:var(--fg);display:block;
}
.stat-label{font-family:var(--font-mono);font-size:9px;color:var(--fg-dim);display:block}

/* ── Status bar ──────────────────────────────────────────────────────── */
.status-bar{
  margin:0 20px 12px;
  padding:8px 14px;
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius-sm);
  display:flex;align-items:center;gap:8px;
}
.status-dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--green);flex-shrink:0;
  animation:blink 2s ease-in-out infinite;
}
.status-dot.loading{background:var(--gold);animation:blink 0.6s ease-in-out infinite}
.status-dot.error{background:var(--red);animation:none}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.status-text{font-family:var(--font-mono);font-size:11px;color:var(--fg-mid)}
.status-refresh{
  margin-left:auto;font-family:var(--font-mono);font-size:10px;
  color:var(--fg-dim);
}

/* ── Paper list ──────────────────────────────────────────────────────── */
#paper-list{
  padding:0 16px;
  padding-bottom:calc(20px + var(--safe-bottom));
  display:flex;flex-direction:column;gap:14px;
}

/* ── Paper card ──────────────────────────────────────────────────────── */
.paper-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  overflow:hidden;
  transition:transform 0.15s,box-shadow 0.15s;
  animation:fadeUp 0.4s ease both;
}
.paper-card:active{transform:scale(0.985)}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(16px)}
  to{opacity:1;transform:translateY(0)}
}
.paper-card:nth-child(1){animation-delay:0.0s}
.paper-card:nth-child(2){animation-delay:0.05s}
.paper-card:nth-child(3){animation-delay:0.10s}
.paper-card:nth-child(4){animation-delay:0.15s}
.paper-card:nth-child(5){animation-delay:0.20s}
.paper-card:nth-child(6){animation-delay:0.25s}

.card-accent{height:3px;width:100%}
.card-body{padding:16px}

.card-meta{
  display:flex;align-items:center;gap:8px;
  margin-bottom:10px;flex-wrap:wrap;
}
.rank-badge{
  font-family:var(--font-mono);font-size:11px;font-weight:500;
  padding:2px 8px;border-radius:4px;
  background:var(--card2);
}
.source-badge{
  font-family:var(--font-mono);font-size:10px;
  padding:2px 8px;border-radius:4px;
}
.source-badge.ss{background:#1e3a4a;color:#38bdf8}
.source-badge.arxiv{background:#1a3040;color:#22d3ee}
.cite-badge{
  font-family:var(--font-mono);font-size:10px;
  color:var(--gold);margin-left:auto;
}
.date-badge{
  font-family:var(--font-mono);font-size:10px;
  color:var(--fg-dim);
}

.paper-title{
  font-family:var(--font-display);
  font-size:16px;font-weight:700;
  color:var(--fg);line-height:1.35;
  margin-bottom:8px;
  cursor:pointer;
  transition:color 0.15s;
}
.paper-title:active{opacity:0.8}

.paper-authors{
  font-family:var(--font-mono);font-size:11px;
  color:var(--fg-dim);margin-bottom:10px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}

.paper-abstract{
  font-family:var(--font-body);font-size:13px;
  color:var(--fg-mid);line-height:1.65;
  margin-bottom:14px;
  display:-webkit-box;-webkit-line-clamp:4;
  -webkit-box-orient:vertical;overflow:hidden;
}

.card-footer{display:flex;align-items:center;justify-content:space-between;gap:8px}
.open-btn{
  display:inline-flex;align-items:center;gap:5px;
  padding:8px 16px;border-radius:40px;
  font-family:var(--font-mono);font-size:12px;font-weight:500;
  color:#fff;cursor:pointer;border:none;
  transition:opacity 0.2s,transform 0.15s;
  text-decoration:none;
}
.open-btn:active{opacity:0.8;transform:scale(0.96)}
.expand-btn{
  background:var(--card2);border:1px solid var(--border);
  color:var(--fg-dim);font-family:var(--font-mono);font-size:11px;
  padding:8px 12px;border-radius:40px;cursor:pointer;
  transition:all 0.2s;
}
.expand-btn:active{background:var(--border)}

/* ── Empty / Loading states ──────────────────────────────────────────── */
.empty-state{
  text-align:center;padding:60px 20px;
  display:flex;flex-direction:column;align-items:center;gap:12px;
}
.empty-icon{font-size:48px;opacity:0.4}
.empty-title{
  font-family:var(--font-display);font-size:20px;
  color:var(--fg-mid);
}
.empty-sub{font-family:var(--font-mono);font-size:12px;color:var(--fg-dim)}

.skeleton{
  background:linear-gradient(90deg,var(--card) 25%,var(--card2) 50%,var(--card) 75%);
  background-size:200% 100%;
  animation:shimmer 1.5s infinite;
  border-radius:6px;
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ── Install banner ──────────────────────────────────────────────────── */
#install-banner{
  display:none;
  margin:0 16px 12px;
  background:linear-gradient(135deg,#0f2a4a,#0a1e38);
  border:1px solid var(--accent);border-radius:var(--radius);
  padding:14px 16px;
  align-items:center;gap:12px;
}
#install-banner.show{display:flex}
.install-text{flex:1}
.install-title{font-family:var(--font-display);font-size:14px;color:var(--accent);font-weight:700}
.install-sub{font-family:var(--font-mono);font-size:11px;color:var(--fg-dim)}
#install-btn{
  background:var(--accent);color:var(--bg);
  font-family:var(--font-mono);font-size:12px;font-weight:500;
  padding:8px 14px;border-radius:40px;border:none;cursor:pointer;
  white-space:nowrap;
}
#install-dismiss{
  background:none;border:none;color:var(--fg-dim);
  font-size:18px;cursor:pointer;padding:4px;
}

/* ── Section heading ─────────────────────────────────────────────────── */
.section-heading{
  padding:0 20px 10px;
  display:flex;align-items:baseline;gap:10px;
}
.section-title{
  font-family:var(--font-display);font-size:20px;font-weight:900;
  color:var(--fg);
}
.section-count{
  font-family:var(--font-mono);font-size:11px;color:var(--fg-dim);
}

/* ── Scrollbar (desktop) ─────────────────────────────────────────────── */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="header-top">
      <div class="logo">
        <span class="logo-star">✦</span>
        <div>
          <span class="logo-text">ScholarWatch</span>

      </div>
      <div class="header-right">
        <div id="clock"></div>
        <button id="refresh-btn" title="Refresh papers">↻</button>
      </div>
    </div>
  </header>

  <!-- Period tabs -->
  <div class="period-tabs">
    <div class="period-tab active" data-period="Daily">📅 Daily</div>
    <div class="period-tab" data-period="Weekly">📆 Weekly</div>
    <div class="period-tab" data-period="Monthly">🗓 Monthly</div>
  </div>

  <!-- Category chips -->
  <div class="cat-scroll">
    <div class="cat-chip active" data-cat="Health">🏥 Health</div>
    <div class="cat-chip" data-cat="Economy">📈 Economy</div>
    <div class="cat-chip" data-cat="Exercise">🏃 Exercise</div>
    <div class="cat-chip" data-cat="Education">🎓 Education</div>

    <div class="cat-chip" data-cat="Others">🔬 Others</div>

  <div id="install-banner">
    <div class="install-text">
      <div class="install-title">Add to Home Screen</div>

    </div>

  </div>

  <!-- Stats bar -->
  <div class="stats-bar" id="stats-bar">
    <div class="stat-item"><span class="stat-icon">🏥</span><span class="stat-num" id="stat-Health">—</span><span class="stat-label">Health</span></div>
    <div class="stat-item"><span class="stat-icon">📈</span><span class="stat-num" id="stat-Economy">—</span><span class="stat-label">Economy</span></div>
    <div class="stat-item"><span class="stat-icon">🏃</span><span class="stat-num" id="stat-Exercise">—</span><span class="stat-label">Exercise</span></div>
    <div class="stat-item"><span class="stat-icon">🎓</span><span class="stat-num" id="stat-Education">—</span><span class="stat-label">Education</span></div>
    <div class="stat-item"><span class="stat-icon">🔋</span><span class="stat-num" id="stat-Battery">—</span><span class="stat-label">Battery</span></div>
    <div class="stat-item"><span class="stat-icon">🔬</span><span class="stat-num" id="stat-Others">—</span><span class="stat-label">Others</span></div>
  </div>

  <!-- Status bar -->
  <div class="status-bar">
    <div class="status-dot" id="status-dot"></div>
    <span class="status-text" id="status-text">Initialising…</span>
    <span class="status-refresh" id="status-refresh"></span>
  </div>

  <!-- Section heading -->
  <div class="section-heading">
    <span class="section-title" id="section-title">Health Papers</span>
    <span class="section-count" id="section-count"></span>
  </div>

  <!-- Paper list -->
  <div id="paper-list"></div>
</div>

<script>
// ── Config ─────────────────────────────────────────────────────────────────
const CATEGORIES = {
  Health:    { color:'#f43f5e', icon:'🏥', keywords:['health','medicine','disease','clinical','cancer','mental health','nutrition','vaccine','therapy','diagnosis','COVID','brain','aging','medical','treatment','patient'] },
  Economy:   { color:'#f59e0b', icon:'📈', keywords:['economics','economy','finance','GDP','inflation','market','monetary','trade','inequality','employment','fiscal','debt','recession','investment'] },
  Exercise:  { color:'#10b981', icon:'🏃', keywords:['exercise','physical activity','sport','fitness','aerobic','muscle','training','sedentary','yoga','running','strength','cardio','endurance'] },
  Education: { color:'#3b82f6', icon:'🎓', keywords:['education','learning','pedagogy','school','university','teaching','student','literacy','curriculum','e-learning','STEM','cognition','classroom'] },
  Battery:   { color:'#a855f7', icon:'🔋', keywords:['battery','lithium','energy storage','solid-state','electrolyte','anode','cathode','supercapacitor','fuel cell','charging','EV','electrode'] },
  Others:    { color:'#06b6d4', icon:'🔬', keywords:[] },
};

const PERIOD_DAYS = { Daily: 2, Weekly: 7, Monthly: 31 };
const REFRESH_MS  = 30 * 60 * 1000;

// ── State ──────────────────────────────────────────────────────────────────
let state = {
  period:   'Daily',
  category: 'Health',
  data:     { Daily:{}, Weekly:{}, Monthly:{} },
  loading:  false,
  lastRefresh: {},
  nextRefresh: null,
};

// ── Utilities ──────────────────────────────────────────────────────────────
function categorize(paper) {
  const text = (paper.title + ' ' + paper.abstract).toLowerCase();
  for (const [cat, cfg] of Object.entries(CATEGORIES)) {
    if (cat === 'Others') continue;
    if (cfg.keywords.some(k => text.includes(k.toLowerCase()))) return cat;
  }
  return 'Others';
}

function timeAgo(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr), now = new Date();
  const diff = Math.floor((now - d) / 86400000);
  if (diff === 0) return 'today';
  if (diff === 1) return 'yesterday';
  return `${diff}d ago`;
}

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── API: Semantic Scholar ──────────────────────────────────────────────────
async function fetchSemanticScholar(query, daysBack) {
  const since = new Date(Date.now() - daysBack * 86400000).toISOString().slice(0,10);
  const params = new URLSearchParams({
    query,
    fields: 'title,abstract,authors,year,citationCount,url,publicationDate,externalIds',
    limit: '8',
    publicationDateOrYear: `${since}:`,
    sort: 'citationCount:desc',
  });
  try {
    const res = await fetch(`https://api.semanticscholar.org/graph/v1/paper/search?${params}`, {
      headers: { 'User-Agent': 'ScholarWatch/1.0' }
    });
    if (!res.ok) return [];
    const data = await res.json();
    return (data.data || []).map(p => {
      const doi = p.externalIds?.DOI || '';
      return {
        title:     p.title || '',
        abstract:  (p.abstract || 'No abstract available.').slice(0, 500),
        authors:   (p.authors || []).slice(0,3).map(a => a.name).join(', '),
        year:      p.year || '',
        citations: p.citationCount || 0,
        date:      p.publicationDate || '',
        url:       p.url || (doi ? `https://doi.org/${doi}` : ''),
        source:    'Semantic Scholar',
      };
    }).filter(p => p.title);
  } catch { return []; }
}

// ── API: arXiv ─────────────────────────────────────────────────────────────
async function fetchArxiv(query, daysBack) {
  const params = new URLSearchParams({
    search_query: `all:${query}`,
    start: '0',
    max_results: '6',
    sortBy: 'submittedDate',
    sortOrder: 'descending',
  });
  try {
    const res = await fetch(`https://export.arxiv.org/api/query?${params}`);
    if (!res.ok) return [];
    const text = await res.text();
    const parser = new DOMParser();
    const xml    = parser.parseFromString(text, 'text/xml');
    const entries = Array.from(xml.querySelectorAll('entry'));
    const cutoff  = new Date(Date.now() - daysBack * 86400000);
    return entries.map(e => {
      const published = e.querySelector('published')?.textContent?.slice(0,10) || '';
      if (published && new Date(published) < cutoff) return null;
      const authors = Array.from(e.querySelectorAll('author name'))
        .slice(0,3).map(a => a.textContent).join(', ');
      const link = e.querySelector('link[rel="alternate"]')?.getAttribute('href')
                || e.querySelector('id')?.textContent || '';
      return {
        title:     e.querySelector('title')?.textContent?.replace(/\s+/g,' ').trim() || '',
        abstract:  (e.querySelector('summary')?.textContent || '').replace(/\s+/g,' ').trim().slice(0,500),
        authors,
        year:      published.slice(0,4),
        citations: 0,
        date:      published,
        url:       link,
        source:    'arXiv',
      };
    }).filter(p => p && p.title);
  } catch { return []; }
}

// ── Fetch all categories for a period ─────────────────────────────────────
const QUERIES = {
  Health:    'health medicine disease clinical trial treatment',
  Economy:   'economics finance market monetary policy inflation',
  Exercise:  'exercise physical activity fitness sport training',
  Education: 'education learning pedagogy university student',
  Battery:   'battery energy storage lithium electrolyte',
  Others:    'breakthrough discovery innovation science technology',
};

async function fetchPeriod(period) {
  const days = PERIOD_DAYS[period];
  const result = {};
  const seen   = new Set();

  for (const [cat, query] of Object.entries(QUERIES)) {
    const [ss, ax] = await Promise.all([
      fetchSemanticScholar(query, days),
      fetchArxiv(query, days),
    ]);
    const combined = [...ss, ...ax].filter(p => {
      const key = p.title.toLowerCase().slice(0,60);
      if (seen.has(key)) return false;
      seen.add(key); return true;
    });
    // Re-categorise into correct buckets
    for (const paper of combined) {
      const realCat = categorize(paper);
      if (!result[realCat]) result[realCat] = [];
      result[realCat].push(paper);
    }
  }

  // Sort & cap
  for (const cat of Object.keys(CATEGORIES)) {
    if (!result[cat]) result[cat] = [];
    result[cat].sort((a,b) => (b.citations - a.citations) || (b.date > a.date ? 1:-1));
    result[cat] = result[cat].slice(0, 15);
  }
  return result;
}

// ── Render ────────────────────────────────────────────────────────────────
function renderPapers() {
  const { period, category, data } = state;
  const papers = (data[period] || {})[category] || [];
  const cfg    = CATEGORIES[category];
  const list   = document.getElementById('paper-list');

  document.getElementById('section-title').textContent = `${cfg.icon} ${category}`;
  document.getElementById('section-count').textContent = papers.length
    ? `${papers.length} paper${papers.length>1?'s':''}` : '';

  if (!papers.length) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">${state.loading ? '⏳' : '🔍'}</div>
        <div class="empty-title">${state.loading ? 'Fetching papers…' : 'No papers found'}</div>
        <div class="empty-sub">${state.loading ? 'Connecting to Semantic Scholar & arXiv' : 'Try Weekly or Monthly, or tap ↻ to refresh'}</div>
      </div>`;
    return;
  }

  list.innerHTML = papers.map((p, i) => {
    const color = cfg.color;
    const srcClass = p.source === 'arXiv' ? 'arxiv' : 'ss';
    const srcLabel = p.source === 'arXiv' ? 'arXiv' : 'S2';
    const ago = timeAgo(p.date);
    return `
    <div class="paper-card" style="animation-delay:${i*0.05}s">
      <div class="card-accent" style="background:${color}"></div>
      <div class="card-body">
        <div class="card-meta">
          <span class="rank-badge" style="color:${color}">#${i+1}</span>
          <span class="source-badge ${srcClass}">${srcLabel}</span>
          ${p.citations > 0 ? `<span class="cite-badge">📊 ${p.citations}</span>` : ''}
          ${ago ? `<span class="date-badge">${ago}</span>` : ''}
        </div>
        <div class="paper-title" onclick="openPaper('${escapeHtml(p.url)}')"
             style="--hover-color:${color}"
             onmouseenter="this.style.color='${color}'"
             onmouseleave="this.style.color=''">
          ${escapeHtml(p.title)}
        </div>
        ${p.authors ? `<div class="paper-authors">👤 ${escapeHtml(p.authors)}</div>` : ''}
        <div class="paper-abstract" id="abs-${i}">${escapeHtml(p.abstract)}</div>
        <div class="card-footer">
          ${p.url ? `<a class="open-btn" href="${escapeHtml(p.url)}" target="_blank" rel="noopener"
              style="background:${color}">Open ↗</a>` : '<span></span>'}
          <button class="expand-btn" onclick="toggleAbstract(${i})">More ↓</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function openPaper(url) {
  if (url && url !== 'undefined') window.open(url, '_blank', 'noopener');
}

let expandedAbstracts = new Set();
function toggleAbstract(i) {
  const el  = document.getElementById(`abs-${i}`);
  const btn = el?.parentElement?.querySelector('.expand-btn');
  if (!el) return;
  if (expandedAbstracts.has(i)) {
    el.style.webkitLineClamp = '4';
    el.style.webkitBoxOrient = 'vertical';
    el.style.display = '-webkit-box';
    el.style.overflow = 'hidden';
    btn && (btn.textContent = 'More ↓');
    expandedAbstracts.delete(i);
  } else {
    el.style.display = 'block';
    el.style.overflow = 'visible';
    btn && (btn.textContent = 'Less ↑');
    expandedAbstracts.add(i);
  }
}

function updateStats() {
  const { period, data } = state;
  const d = data[period] || {};
  for (const cat of Object.keys(CATEGORIES)) {
    const el = document.getElementById(`stat-${cat}`);
    if (el) el.textContent = d[cat]?.length ?? '—';
  }
}

function setStatus(text, mode='idle') {
  const dot  = document.getElementById('status-dot');
  const span = document.getElementById('status-text');
  dot.className  = 'status-dot ' + (mode==='loading' ? 'loading' : mode==='error' ? 'error' : '');
  span.textContent = text;
}

function updateRefreshLabel() {
  const el = document.getElementById('status-refresh');
  const ts = state.lastRefresh[state.period];
  if (!ts) { el.textContent = ''; return; }
  const next = ts + REFRESH_MS;
  const rem  = Math.max(0, Math.round((next - Date.now()) / 1000));
  const m = Math.floor(rem/60), s = rem%60;
  el.textContent = `↻ ${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

// ── Clock ──────────────────────────────────────────────────────────────────
function tickClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
  updateRefreshLabel();
  setTimeout(tickClock, 1000);
}

// ── Load & refresh ─────────────────────────────────────────────────────────
async function loadPeriod(period, silent=false) {
  if (state.loading && !silent) return;
  state.loading = true;

  const btn = document.getElementById('refresh-btn');
  btn.classList.add('spinning');

  if (!silent) setStatus(`Fetching ${period} papers from Semantic Scholar & arXiv…`, 'loading');

  renderPapers(); // show loading state

  try {
    const result = await fetchPeriod(period);
    state.data[period] = result;
    state.lastRefresh[period] = Date.now();
    updateStats();
    if (state.period === period) renderPapers();
    setStatus(`Updated ${new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}`, 'idle');
  } catch(e) {
    setStatus('Could not fetch — check connection', 'error');
  }

  state.loading = false;
  btn.classList.remove('spinning');
}

function scheduleAutoRefresh(period) {
  clearTimeout(state.nextRefresh);
  state.nextRefresh = setTimeout(() => {
    loadPeriod(state.period, true);
    scheduleAutoRefresh(state.period);
  }, REFRESH_MS);
}

// ── Event wiring ───────────────────────────────────────────────────────────
document.querySelectorAll('.period-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.period-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    state.period = tab.dataset.period;
    expandedAbstracts.clear();
    renderPapers();
    updateStats();
    if (!state.data[state.period] || !Object.keys(state.data[state.period]).length) {
      loadPeriod(state.period);
    }
  });
});

document.querySelectorAll('.cat-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    state.category = chip.dataset.cat;
    expandedAbstracts.clear();
    renderPapers();
  });
});

document.getElementById('refresh-btn').addEventListener('click', () => {
  loadPeriod(state.period);
  scheduleAutoRefresh(state.period);
});

// ── PWA install prompt ─────────────────────────────────────────────────────
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('install-banner').classList.add('show');
});
document.getElementById('install-btn').addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById('install-banner').classList.remove('show');
});
document.getElementById('install-dismiss').addEventListener('click', () => {
  document.getElementById('install-banner').classList.remove('show');
});

// ── Service Worker registration ────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}

// ── Boot ───────────────────────────────────────────────────────────────────
tickClock();
// Load Daily first, then lazy-load others
loadPeriod('Daily').then(() => {
  setTimeout(() => loadPeriod('Weekly', true), 1000);
  setTimeout(() => loadPeriod('Monthly', true), 3000);
  scheduleAutoRefresh('Daily');
});
</script>
</body>
</html>
